<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hospital Management System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <nav>

        <h2>🏥 Hospital Management System</h2>

    </nav>

    <div class="container">

        <div class="dashboard">

            <div class="card">

                <h3>Total Patients</h3>

                <h1 id="totalPatients">0</h1>

            </div>

            <div class="card">

                <h3>Total Doctors</h3>

                <h1>10</h1>

            </div>

            <div class="card">

                <h3>Available Beds</h3>

                <h1>35</h1>

            </div>

        </div>

        <div class="form-container">

            <h2>Add Patient</h2>

            <form id="patientForm">

                <input type="hidden" id="patientId">

                <input type="text" id="patientName" placeholder="Patient Name" required>

                <input type="number" id="age" placeholder="Age" required>

                <select id="gender" required>

                    <option value="">Select Gender</option>

                    <option>Male</option>

                    <option>Female</option>

                    <option>Other</option>

                </select>

                <select id="bloodGroup" required>

                    <option value="">Select Blood Group</option>

                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                    <option>O+</option>
                    <option>O-</option>

                </select>

                <select id="disease" required>

                    <option value="">Select Disease</option>

                    <option>Fever</option>
                    <option>Dengue</option>
                    <option>Malaria</option>
                    <option>Typhoid</option>
                    <option>Diabetes</option>
                    <option>Asthma</option>
                    <option>Covid-19</option>
                    <option>Heart Disease</option>
                    <option>Skin Allergy</option>
                    <option>Fracture</option>
                    <option>Kidney Stone</option>
                    <option>Migraine</option>
                    <option>Food Poisoning</option>
                    <option>Pneumonia</option>
                    <option>Eye Infection</option>

                </select>

                <select id="doctorName" required>

                    <option value="">Select Doctor</option>

                </select>

                <input type="tel"
                    id="mobile"
                    placeholder="Mobile Number"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    required>

                <input type="date" id="admitDate" required>

                <button type="submit">

                    Add Patient

                </button>

            </form>

        </div>

        <div class="table-container">

            <div class="table-header">

                <h2>Patient Records</h2>

                <input
                    type="text"
                    id="search"
                    placeholder="Search Patient">

            </div>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Age</th>

                        <th>Gender</th>

                        <th>Blood</th>

                        <th>Disease</th>

                        <th>Doctor</th>

                        <th>Mobile</th>

                        <th>Admit Date</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="patientTable">

                </tbody>

            </table>

        </div>

    </div>

    <footer>

        © 2026 Hospital Management System | Developed by A T

    </footer>

    <script src="script.js"></script>

</body>

</html>
